services:
  rabbitmq:
    image: rabbitmq:management
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"

    environment:
      RABBITMQ_DEFAULT_USER: taskiq
      RABBITMQ_DEFAULT_PASS: taskiq

    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gflow_db
    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d gflow_db"]
      interval: 5s
      timeout: 5s
      retries: 3

  api:
    build:
      context: ../../app
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - /storage/test:/targets
    ports:
      - "8000:8000"
    environment:
      - API_DB_POSTGRES_URL=postgresql+psycopg://user:password@postgres:5432/gflow_db
      - BACKEND_POSTGRES_URL=postgresql://user:password@postgres:5432/gflow_db
      - AMQP_URL=amqp://taskiq:taskiq@rabbitmq:5672/
      - OPENSEARCH_HOST=192.168.128.137
      - OPENSEARCH_PORT=9200
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ../../app
      dockerfile: Dockerfile
    command: taskiq worker broker:broker tasks --workers 4
    volumes:
      - /storage/test:/targets
    environment:
      - BACKEND_POSTGRES_URL=postgresql://user:password@postgres:5432/gflow_db
      - AMQP_URL=amqp://taskiq:taskiq@rabbitmq:5672/
      - EVENT_BROKER_HOST=192.168.128.137
      - EVENT_BROKER_PORT=5044
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

    deploy:
      replicas: 2