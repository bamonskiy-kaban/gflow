services:
  # MinIO для хранения данных (объектное хранилище)
  minio:
    image: minio/minio:latest
    container_name: juicefs-minio
    ports:
      - "9000:9000"      # Порт для API S3
      - "9001:9001"      # Порт для веб-консоли
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - MINIO_ACCESS_KEY=minioadmin  # Для совместимости с старыми версиями
      - MINIO_SECRET_KEY=minioadmin
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"
    networks:
      - juicefs-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Redis для хранения метаданных JuiceFS
  redis:
    image: redis:7-alpine
    container_name: juicefs-redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes --save 60 1
    networks:
      - juicefs-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  juicefs-net:
    driver: bridge
